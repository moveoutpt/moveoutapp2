<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoveOut — Entrar</title>
<link rel="stylesheet" href="app.css">
<style>
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg); }
  .login-wrap { width: 100%; max-width: 400px; padding: 20px; }
  .login-logo { text-align: center; margin-bottom: 32px; }
  .login-logo-icon { width: 56px; height: 56px; background: var(--green); border-radius: 16px; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 12px; }
  .login-logo-icon svg { width: 30px; height: 30px; }
  .login-logo h1 { font-size: 24px; font-weight: 900; color: var(--green); }
  .login-logo p { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .login-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; }
  .login-card h2 { font-size: 18px; font-weight: 900; margin-bottom: 6px; }
  .login-card .sub { font-size: 13px; color: var(--muted); margin-bottom: 22px; }
  .login-card .btn { width: 100%; justify-content: center; padding: 11px; font-size: 14px; }
  .divider { text-align: center; font-size: 12px; color: var(--muted); margin: 16px 0; position: relative; }
  .divider::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: var(--border); }
  .divider span { background: var(--bg2); padding: 0 10px; position: relative; }
  .client-link { text-align: center; margin-top: 20px; font-size: 13px; color: var(--muted); }
  .client-link a { color: var(--green); font-weight: 700; text-decoration: none; }
  .error-msg { background: #FEE2E2; color: #991B1B; border-radius: var(--radius-sm); padding: 10px 12px; font-size: 13px; margin-bottom: 14px; display: none; }
  .error-msg.show { display: block; }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-logo">
    <div class="login-logo-icon">
      <svg viewBox="0 0 20 20" fill="none"><path d="M4 10h12M10 4l6 6-6 6" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <h1>MOVE OUT</h1>
    <p>Treino Outdoor · Personal Training</p>
  </div>
  <div class="login-card">
    <h2>Bem-vindo de volta 👋</h2>
    <p class="sub">Entra na tua conta para continuar</p>
    <div class="error-msg" id="error-msg">Email ou password incorretos.</div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="moveoutpt@gmail.com" value="moveoutpt@gmail.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••"/>
    </div>
    <button class="btn btn-primary" id="btn-login" onclick="doLogin()">Entrar</button>
    <div class="divider"><span>ou</span></div>
    <div class="client-link">
      És cliente? <a href="cliente/login.html">Acede aqui aos teus treinos →</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script>
  // Demo login (sem Supabase configurado ainda)
  async function doLogin() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const btn = document.getElementById('btn-login');
    btn.textContent = 'A entrar...'; btn.disabled = true;

    // Se Supabase não está configurado, usa demo mode
    if (SUPABASE_URL.includes('SEU_PROJETO')) {
      if (email && password) {
        localStorage.setItem('moveout_demo', '1');
        window.location.href = 'index.html';
      } else {
        document.getElementById('error-msg').classList.add('show');
        btn.textContent = 'Entrar'; btn.disabled = false;
      }
      return;
    }
    try {
      await signIn(email, password);
      window.location.href = 'index.html';
    } catch (e) {
      document.getElementById('error-msg').classList.add('show');
      btn.textContent = 'Entrar'; btn.disabled = false;
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
