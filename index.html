<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoveOut — Dashboard</title>
<link rel="stylesheet" href="css/app.css">
<style>
  .dash-hero { background: var(--green-bg); border-radius: var(--radius); padding: 24px 28px; margin-bottom: 20px; }
  .dash-hero-date { font-size: 12px; color: rgba(255,255,255,.6); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .dash-hero h1 { font-size: 26px; font-weight: 900; color: #fff; margin-bottom: 4px; }
  .dash-hero p { font-size: 13px; color: rgba(255,255,255,.65); }
  .stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 20px; }
  .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; display: flex; align-items: flex-start; justify-content: space-between; cursor: pointer; transition: border-color .14s; text-decoration: none; color: inherit; }
  .stat-card:hover { border-color: var(--border2); }
  .stat-lbl { font-size: 12px; color: var(--muted); margin-bottom: 8px; font-weight: 700; }
  .stat-val { font-size: 34px; font-weight: 900; line-height: 1; }
  .stat-sub { font-size: 11px; color: var(--muted); margin-top: 5px; }
  .stat-icon { width: 38px; height: 38px; border-radius: 10px; background: var(--bg3); display: flex; align-items: center; justify-content: center; }
  .stat-icon svg { width: 18px; height: 18px; color: var(--green); }
  .dash-two { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .sessao-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .sessao-item:last-child { border-bottom: none; }
  .sessao-av { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; flex-shrink: 0; }
  .sessao-info { flex: 1; }
  .sessao-name { font-size: 13px; font-weight: 700; }
  .sessao-meta { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .sessao-time { font-size: 13px; font-weight: 700; color: var(--green); }
  @media (max-width: 900px) { .stats-row { grid-template-columns: 1fr 1fr; } .dash-two { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div id="toast"></div>
<div class="app-shell">
  <div id="sidebar-mount"></div>
  <div class="main">
    <div class="topbar">
      <div class="topbar-title">Dashboard</div>
      <div style="display:flex;gap:8px">
        <a href="clientes.html?new=1" class="btn btn-sm">+ Cliente</a>
        <a href="treinos.html?new=1" class="btn btn-primary btn-sm">+ Treino</a>
      </div>
    </div>
    <div class="content">
      <div class="dash-hero">
        <div class="dash-hero-date" id="hero-date"></div>
        <h1 id="hero-greeting">Bom dia, Miguel! 👋</h1>
        <p id="hero-sessions">A carregar sessões...</p>
      </div>

      <div class="stats-row">
        <a href="clientes.html" class="stat-card">
          <div>
            <div class="stat-lbl">Clientes Ativos</div>
            <div class="stat-val" id="stat-clientes">—</div>
            <div class="stat-sub" id="stat-clientes-sub">a carregar...</div>
          </div>
          <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="7" r="4"/><path d="M2 21v-2a4 4 0 0 1 4-4h6a4 4 0 0 1 4 4v2"/></svg></div>
        </a>
        <a href="agenda.html" class="stat-card">
          <div>
            <div class="stat-lbl">Sessões Hoje</div>
            <div class="stat-val" id="stat-sessoes">—</div>
            <div class="stat-sub">agendadas</div>
          </div>
          <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></div>
        </a>
        <a href="treinos.html" class="stat-card">
          <div>
            <div class="stat-lbl">Treinos Semana</div>
            <div class="stat-val" id="stat-treinos">—</div>
            <div class="stat-sub">realizados</div>
          </div>
          <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg></div>
        </a>
        <a href="clientes.html" class="stat-card">
          <div>
            <div class="stat-lbl">A Renovar</div>
            <div class="stat-val" id="stat-renovar">—</div>
            <div class="stat-sub">packs a terminar</div>
          </div>
          <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 7l-8.5 8.5-5-5L2 17"/><path d="M16 7h6v6"/></svg></div>
        </a>
      </div>

      <div class="dash-two">
        <div class="panel">
          <div class="panel-hdr">
            <div class="panel-title">Sessões de Hoje</div>
            <a href="agenda.html" class="panel-link">Ver agenda →</a>
          </div>
          <div id="sessoes-hoje"></div>
        </div>
        <div class="panel">
          <div class="panel-hdr">
            <div class="panel-title">Próximas Sessões</div>
            <a href="agenda.html" class="panel-link">Ver tudo →</a>
          </div>
          <div id="proximas-sessoes"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/app.js"></script>
<script src="js/sidebar.js"></script>
<script>
document.getElementById('sidebar-mount').innerHTML = renderSidebar('dashboard');

// Hero date & greeting
const now = new Date();
const dateStr = now.toLocaleDateString('pt-PT', { weekday: 'long', day: 'numeric', month: 'long' });
document.getElementById('hero-date').innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg> ${dateStr.charAt(0).toUpperCase() + dateStr.slice(1)}`;
const h = now.getHours();
const gr = h < 12 ? 'Bom dia' : h < 19 ? 'Boa tarde' : 'Boa noite';
document.getElementById('hero-greeting').textContent = `${gr}, Miguel! 👋`;

const DEMO_CLIENTES = [
  { id: '1', nome: 'Joana Lima', objetivo: 'Glúteo + Tonificação', status: 'ativo', sessoes_semana: 2, avatar_initials: 'JL', avatar_color: '#D8F3DC', avatar_text: '#1B4332' },
  { id: '2', nome: 'Marta H.', objetivo: 'Perda de Peso', status: 'ativo', sessoes_semana: 2, avatar_initials: 'MH', avatar_color: '#FEF3C7', avatar_text: '#92400E' },
  { id: '3', nome: 'Maria Inês N.', objetivo: 'Full Body + Força', status: 'inativo', sessoes_semana: 3, avatar_initials: 'MI', avatar_color: '#DBEAFE', avatar_text: '#1E3A8A' },
];

async function loadDashboard() {
  // Stats
  document.getElementById('stat-clientes').textContent = '2';
  document.getElementById('stat-clientes-sub').textContent = '3 total';
  document.getElementById('stat-sessoes').textContent = '0';
  document.getElementById('stat-treinos').textContent = '4';
  document.getElementById('stat-renovar').textContent = '1';
  document.getElementById('hero-sessions').textContent = 'Tens 0 sessões hoje.';

  // Sessões hoje — empty
  document.getElementById('sessoes-hoje').innerHTML = `
    <div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      <p>Sem sessões agendadas para hoje</p>
    </div>`;

  // Próximas sessões
  const proximas = [
    { nome: 'Joana Lima', av: 'JL', avBg: '#D8F3DC', avTxt: '#1B4332', tipo: 'Full Body', data: 'Segunda, 16 Mar', hora: '09:00' },
    { nome: 'Marta H.', av: 'MH', avBg: '#FEF3C7', avTxt: '#92400E', tipo: 'Cardio', data: 'Quarta, 18 Mar', hora: '10:00' },
  ];
  document.getElementById('proximas-sessoes').innerHTML = proximas.map(s => `
    <div class="sessao-item">
      <div class="sessao-av" style="background:${s.avBg};color:${s.avTxt}">${s.av}</div>
      <div class="sessao-info">
        <div class="sessao-name">${s.nome}</div>
        <div class="sessao-meta">${s.data} · ${s.tipo}</div>
      </div>
      <div class="sessao-time">${s.hora}</div>
    </div>`).join('');
}

loadDashboard();
</script>
</body>
</html>
